<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YHK Mini Printer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <div class="header-row">
          <div>
            <h1>YHK Mini Printer</h1>
            <p class="subtitle">Phase 1 — Web Bluetooth proof of concept</p>
          </div>
          <a
            class="github-link"
            href="https://github.com/joshmcarthur/yhk-mini-printer"
            target="_blank"
            rel="noopener noreferrer"
          >
            GitHub
          </a>
        </div>
      </header>

      <section class="actions">
        <button id="connect-btn" type="button">Connect</button>
        <button id="print-btn" type="button" disabled>Print Test Image</button>
        <button id="disconnect-btn" type="button" disabled>Disconnect</button>
      </section>

      <p id="connection-status" class="connection-status">Not connected</p>

      <section class="preview-section">
        <h2>Preview</h2>
        <canvas id="preview" width="384" height="240"></canvas>
      </section>

      <section class="log-section">
        <h2>Status</h2>
        <pre id="log" aria-live="polite"></pre>
      </section>

      <section class="demo-section">
        <h2>Demo</h2>
        <div class="demo-grid">
          <figure class="demo-item">
            <figcaption>Web app — connect and print</figcaption>
            <video src="./docs/images/screen-record.webm" controls playsinline></video>
          </figure>
          <figure class="demo-item">
            <figcaption>Printer output — test image on paper</figcaption>
            <video src="./docs/images/demo.webm" controls playsinline></video>
          </figure>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
